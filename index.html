<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClarityOne PS - Project Gantt Chart Automation | Oxyscale AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#E8470B;--primary-dark:#c93d09;--primary-light:#ff6b35;
  --bg:#111827;--card:#1a2234;--surface:#0f1623;
  --border:rgba(255,255,255,0.07);--accent-border:rgba(232,71,11,0.3);
  --glow:rgba(232,71,11,0.15);--glow-strong:rgba(232,71,11,0.25);
  --dim:#8896ab;--muted:#5a6a80;--white:#ffffff;
  --font:'Inter',sans-serif;
}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--white);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-250px;left:50%;transform:translateX(-50%);width:900px;height:600px;background:radial-gradient(ellipse,rgba(232,71,11,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:48px 24px 64px;}

.hdr{text-align:center;margin-bottom:56px;}
.hdr .brand{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:20px;}
.hdr .brand span{color:var(--primary);}
.hdr h1{font-size:32px;font-weight:800;line-height:1.25;margin-bottom:10px;}
.hdr h1 span{color:var(--primary);}
.hdr .sub{font-size:14px;color:var(--dim);max-width:560px;margin:0 auto 28px;line-height:1.7;}
.hdr .client-badge{display:inline-flex;align-items:center;gap:10px;padding:8px 20px;background:var(--card);border:1px solid var(--border);border-radius:24px;font-size:12px;font-weight:600;color:var(--dim);margin-bottom:8px;}
.hdr .client-badge .cb-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);}
.hdr .client-badge span{color:var(--white);}

.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-bottom:48px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:500;color:var(--dim);}
.legend-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;background:var(--card);border:1px solid var(--border);}
.legend-icon.ai-icon{background:var(--glow);border-color:var(--accent-border);color:var(--primary);}

.phase{margin-bottom:8px;}
.phase-hdr{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.phase-icon{width:48px;height:48px;border-radius:12px;background:var(--glow);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--primary);flex-shrink:0;}
.phase-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--primary);margin-bottom:2px;}
.phase-name{font-size:20px;font-weight:800;}
.phase-body{padding-left:24px;border-left:1px solid var(--border);margin-left:24px;}

.phase-connector{display:flex;flex-direction:column;align-items:center;padding:4px 0;margin-left:24px;}
.phase-connector .pc-line{width:1px;height:32px;background:linear-gradient(to bottom,var(--accent-border),var(--border));}
.phase-connector .pc-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);margin:4px 0;}

.node{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;position:relative;}
.node:hover{border-color:var(--accent-border);box-shadow:0 2px 12px rgba(0,0,0,0.2);}
.node-top{display:flex;align-items:center;gap:12px;}
.node-icon{width:32px;height:32px;border-radius:7px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);flex-shrink:0;}
.node-info{flex:1;min-width:0;}
.node-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.node-detail{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.5;}
.node-arrow{font-size:12px;color:var(--muted);transition:transform 0.25s;flex-shrink:0;margin-left:auto;padding-left:8px;}
.node-arrow.open{transform:rotate(90deg);}

.node.ai-node{background:linear-gradient(135deg,rgba(232,71,11,0.08) 0%,rgba(232,71,11,0.03) 100%);border-color:var(--accent-border);}
.node.ai-node .node-icon{background:var(--glow);border-color:var(--accent-border);color:var(--primary);}
.ai-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--primary);background:var(--glow);border:1px solid var(--accent-border);border-radius:4px;padding:1px 8px;line-height:1.6;}

.node-subs{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.node-subs.open{display:block;}
.node-sub{display:flex;align-items:flex-start;gap:8px;padding:4px 0 4px 8px;font-size:12px;color:var(--dim);line-height:1.5;}
.node-sub .sub-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);margin-top:6px;flex-shrink:0;}
.node.ai-node .node-sub .sub-dot{background:var(--primary);}

.node-conn{display:flex;align-items:center;padding-left:40px;margin:2px 0;}
.node-conn .nc-line{width:1px;height:8px;background:var(--accent-border);opacity:0.4;}

.principles{margin-top:48px;}
.principles .p-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--primary);margin-bottom:6px;}
.principles .p-title{font-size:20px;font-weight:800;margin-bottom:20px;}
.p-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;}
.p-card .pc-title{font-size:13px;font-weight:700;margin-bottom:6px;}
.p-card .pc-desc{font-size:12px;color:var(--dim);line-height:1.6;}

.ftr{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);letter-spacing:0.5px;}
.ftr span{color:var(--primary);font-weight:600;}

@media(max-width:640px){
  .hdr h1{font-size:24px;}
  .p-grid{grid-template-columns:1fr;}
  .legend{gap:10px;}
  .phase-hdr{gap:12px;}
  .phase-name{font-size:17px;}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
var DATA = {
  client: "ClarityOne Property Services",
  title: "Project Gantt Chart",
  titleAccent: "Automation",
  subtitle: "An end-to-end scheduling tool that lets your team build branded project timelines, email them directly to clients, and sync everything to Monday.com - all from a single interface.",
  phases: [
    {
      name: "Project Setup",
      icon: "\u2295",
      label: "Phase 1",
      nodes: [
        {
          type: "trigger",
          icon: "\u25B6",
          title: "User Opens Scheduling Tool",
          detail: "Jack or any team member opens the ClarityOne Gantt Chart Generator from a browser or Monday.com embed.",
          subs: ["No login required - runs from a single hosted URL","Works on desktop, tablet, and mobile","Branded with ClarityOne logo, colours, and contact details"]
        },
        {
          type: "process",
          icon: "\u2699",
          title: "Enter Site and Client Details",
          detail: "The user fills in the project information that will appear on the final Gantt chart header.",
          subs: ["Site address (e.g. 12 Smith Street, Fakeville VIC 3000)","Client or agent name for personalisation","Client email address for direct delivery","Sender name so the client knows who sent it"]
        },
        {
          type: "process",
          icon: "\u2699",
          title: "Select Trades from Dropdown",
          detail: "Choose from 45+ pre-loaded property service trades pulled from your Xero chart of accounts.",
          subs: ["Full trade list: Painting, Electrical, Plumbing, Tiling, Carpentry, Roofing, Demolition, and 38 more","Add a description for each trade (e.g. 'Paint all walls and ceilings')","Add multiple trades - each appears as a card you can remove or reorder","Trade list is fully customisable to match your Xero categories"]
        }
      ]
    },
    {
      name: "Schedule Configuration",
      icon: "\u29BE",
      label: "Phase 2",
      nodes: [
        {
          type: "process",
          icon: "\u2699",
          title: "Assign Date Ranges",
          detail: "For each trade added, the user selects a start date and end date using date pickers.",
          subs: ["Each trade gets its own date card with the trade name and description","Overlapping dates are handled automatically on the chart","Visual validation prevents end dates before start dates"]
        },
        {
          type: "automation",
          icon: "\u26A1",
          title: "Automatic Duration Calculation",
          detail: "The system calculates project duration, identifies the overall start and completion dates, and prepares the timeline.",
          subs: ["Total project duration calculated from earliest start to latest end","Each trade bar width is proportional to its duration","Day-by-day timeline generated with day numbers and weekday labels"]
        }
      ]
    },
    {
      name: "Gantt Chart Generation",
      icon: "\u27D0",
      label: "Phase 3",
      nodes: [
        {
          type: "automation",
          icon: "\u26A1",
          title: "Generate Branded Timeline",
          detail: "The system builds a professional, colour-coded Gantt chart branded with ClarityOne's identity.",
          subs: ["ClarityOne logo and teal colour scheme applied automatically","Site address, client name, and project dates displayed in the header","Each trade gets a unique colour bar with duration labels","Trade pills show all services at a glance"]
        },
        {
          type: "process",
          icon: "\u2699",
          title: "Interactive Preview",
          detail: "The generated chart is displayed on screen for review before sending.",
          subs: ["Hover over any bar to see trade name, exact dates, and description","Month headers and day columns for easy reading","Scrollable for projects spanning multiple weeks","Edit Dates and Edit Trades buttons to go back and adjust"]
        },
        {
          type: "decision",
          icon: "\u25C6",
          title: "Review and Approve",
          detail: "The user reviews the chart and decides whether to send it to the client or make changes.",
          subs: ["If changes needed - go back to Step 1 or Step 2","If approved - proceed to send to client","Can also save as PDF only without emailing"]
        }
      ]
    },
    {
      name: "Client Delivery",
      icon: "\u2197",
      label: "Phase 4",
      nodes: [
        {
          type: "process",
          icon: "\u2699",
          title: "Configure Delivery Options",
          detail: "The Send to Client card lets the user set up exactly how the schedule gets delivered.",
          subs: ["Client email field (auto-populated from Step 1)","Optional CC field for agents","Checkbox: also upload to Monday.com project board","Checkbox: send a copy to david@clarityone.com.au"]
        },
        {
          type: "automation",
          icon: "\u26A1",
          title: "Generate PDF Attachment",
          detail: "The Gantt chart is rendered as a clean, print-ready PDF with full ClarityOne branding.",
          subs: ["All UI chrome stripped - only the branded chart and project header","Colour-coded bars preserved in print","Optimised for A4 landscape format","File named: ClarityOne-Schedule-[SiteAddress].pdf"]
        },
        {
          type: "automation",
          icon: "\u26A1",
          title: "Send Branded Email to Client",
          detail: "The system sends a professional email with the PDF attached, personalised to the client and project.",
          subs: ["ClarityOne branded email template with logo and colours","Personalised greeting using client name","Project summary: address, dates, trades listed","PDF Gantt chart attached for download","Sent from a ClarityOne domain email address"]
        }
      ]
    },
    {
      name: "CRM Sync",
      icon: "\u29C9",
      label: "Phase 5",
      nodes: [
        {
          type: "automation",
          icon: "\u26A1",
          title: "Upload to Monday.com",
          detail: "The PDF and project data are automatically pushed to the correct Monday.com project board.",
          subs: ["Matches the project item by site address","PDF attached as a file to the project","Trade list, dates, and client details populated in columns","Status updated to 'Schedule Sent'"]
        },
        {
          type: "process",
          icon: "\u2699",
          title: "Project Dashboard",
          detail: "Use Monday.com board views to track all active project schedules across the business.",
          subs: ["Timeline view shows all projects and trade overlaps","Filter by trade type, date range, or status","See which clients have received schedules","Track project progress against planned dates"]
        }
      ]
    }
  ],
  principles: [
    { title: "One-Click Delivery", desc: "From trade selection to client inbox in under 2 minutes. No file saving, no email drafting, no manual uploads." },
    { title: "CRM as Source of Truth", desc: "Every schedule lives in Monday.com. ClarityOne has full visibility of what has been sent, to whom, and when." },
    { title: "Branded and Professional", desc: "Every touchpoint carries ClarityOne's identity. Clients see a polished, trustworthy business - not a spreadsheet." }
  ]
};

function render(){
  var app = document.getElementById('app');
  var html = '';

  html += '<div class="hdr">';
  html += '<div class="brand">OXYSCALE <span>AI</span> &middot; Work Smarter, Not Harder</div>';
  html += '<div class="client-badge"><div class="cb-dot"></div>Built for <span>' + DATA.client + '</span></div>';
  html += '<h1>' + DATA.title + ' <span>' + DATA.titleAccent + '</span></h1>';
  html += '<p class="sub">' + DATA.subtitle + '</p>';
  html += '</div>';

  html += '<div class="legend">';
  var types = [
    { icon: '\u2699', label: 'Process', cls: '' },
    { icon: '\u26A1', label: 'Automation', cls: '' },
    { icon: '\u25C6', label: 'Decision', cls: '' },
    { icon: '\u25B6', label: 'Trigger', cls: '' }
  ];
  types.forEach(function(t) {
    html += '<div class="legend-item"><div class="legend-icon ' + t.cls + '">' + t.icon + '</div>' + t.label + '</div>';
  });
  html += '</div>';

  DATA.phases.forEach(function(phase, pi) {
    html += '<div class="phase">';
    html += '<div class="phase-hdr">';
    html += '<div class="phase-icon">' + phase.icon + '</div>';
    html += '<div><div class="phase-label">' + phase.label + '</div><div class="phase-name">' + phase.name + '</div></div>';
    html += '</div>';
    html += '<div class="phase-body">';

    phase.nodes.forEach(function(node, ni) {
      var isAi = node.type === 'ai';
      var nodeId = 'n' + pi + '_' + ni;
      html += '<div class="node' + (isAi ? ' ai-node' : '') + '" onclick="toggleNode(\'' + nodeId + '\')">';
      html += '<div class="node-top">';
      html += '<div class="node-icon">' + node.icon + '</div>';
      html += '<div class="node-info">';
      html += '<div class="node-title">' + node.title + (isAi ? ' <span class="ai-badge">\u2726 AI</span>' : '') + '</div>';
      html += '<div class="node-detail">' + node.detail + '</div>';
      html += '</div>';
      html += '<div class="node-arrow" id="arrow_' + nodeId + '">\u25B6</div>';
      html += '</div>';
      if (node.subs && node.subs.length) {
        html += '<div class="node-subs" id="subs_' + nodeId + '">';
        node.subs.forEach(function(s) {
          html += '<div class="node-sub"><div class="sub-dot"></div><span>' + s + '</span></div>';
        });
        html += '</div>';
      }
      html += '</div>';

      if (ni < phase.nodes.length - 1) {
        html += '<div class="node-conn"><div class="nc-line"></div></div>';
      }
    });

    html += '</div></div>';

    if (pi < DATA.phases.length - 1) {
      html += '<div class="phase-connector"><div class="pc-line"></div><div class="pc-dot"></div><div class="pc-line"></div></div>';
    }
  });

  html += '<div class="principles">';
  html += '<div class="p-label">Design Principles</div>';
  html += '<div class="p-title">Why This Works</div>';
  html += '<div class="p-grid">';
  DATA.principles.forEach(function(p) {
    html += '<div class="p-card"><div class="pc-title">' + p.title + '</div><div class="pc-desc">' + p.desc + '</div></div>';
  });
  html += '</div></div>';

  html += '<div class="ftr"><span>Oxyscale AI</span> &middot; Work Smarter, Not Harder</div>';

  app.innerHTML = html;
}

function toggleNode(id) {
  var subs = document.getElementById('subs_' + id);
  var arrow = document.getElementById('arrow_' + id);
  if (!subs) return;
  subs.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
}

render();
</script>
</body>
</html>
